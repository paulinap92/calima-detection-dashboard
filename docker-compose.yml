version: "3.9"

services:
  calima_mongo:
    image: mongo:7
    container_name: calima_mongo
    restart: always
    command: ["mongod", "--bind_ip_all", "--noauth"]
    ports:
      - "27018:27017"
    volumes:
      - calima_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  calima_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calima_app
    restart: always
    depends_on:
      calima_mongo:
        condition: service_healthy
    environment:
      MONGO_HOST: calima_mongo
      MONGO_PORT: 27017
      MONGO_DB_NAME: calima
      # możesz też zamiast host/port dać URI (jak w db_config to obsługujesz):
      # MONGO_URI: mongodb://calima_mongo:27017
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./streamlit_main.py:/app/streamlit_main.py
      - ./main.py:/app/main.py

volumes:
  calima_mongo_data:
